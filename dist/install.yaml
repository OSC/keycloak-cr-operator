apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: keycloak-cr-operator
    control-plane: controller-manager
  name: keycloak-cr-operator-controller-manager
  namespace: keycloak-cr-operator-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak-cr-operator
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: keycloak-cr-operator
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --metrics-bind-address=:8443
        - --keycloak-url=$(KEYCLOAK_URL)
        - --keycloak-admin-username=$(KEYCLOAK_ADMIN_USERNAME)
        - --keycloak-admin-password=$(KEYCLOAK_ADMIN_PASSWORD)
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
        command:
        - /manager
        envFrom:
        - configMapRef:
            name: keycloak-cr-operator-keycloak-cr-operator-c4f9t84dgg
        - secretRef:
            name: keycloak-cr-operator-keycloak-cr-operator-54c7265fkf
        image: controller:latest
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: webhook-certs
          readOnly: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: keycloak-cr-operator-controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
      - name: webhook-certs
        secret:
          secretName: webhook-server-cert
