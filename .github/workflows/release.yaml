name: Release

on:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  release-docker:
    runs-on: ubuntu-latest
    name: Release Docker
    steps:
      - name: Set version
        run: |
          ref=${GITHUB_REF#refs/*/}
          if [ $ref = "main" ]; then
            version="latest"
          else
            version=$ref
          fi
          echo "REF=${ref}" >> $GITHUB_ENV
          echo "VERSION=${version}" >> $GITHUB_ENV
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.OSC_ROBOT_DOCKERHUB_USER }}
          password: ${{ secrets.OSC_ROBOT_DOCKERHUB_TOKEN }}
      - name: Login to quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ACCESS_TOKEN }}
      - name: Build and push
        run: |
          make docker-build docker-push IMG=ohiosupercomputer/keycloak-cr-operator:${{ env.VERSION }}
          make docker-build docker-push IMG=quay.io/ohiosupercomputercenter/keycloak-cr-operator:${{ env.VERSION }}
  release:
    runs-on: ubuntu-latest
    name: Create Release
    needs: [release-docker]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Set version
        run: |
          TAG="${GITHUB_REF#refs/*/}"
          echo "APP_VERSION=$TAG" >> $GITHUB_ENV
          echo "VERSION=${TAG#v}" >> $GITHUB_ENV
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.1.1
      - name: Verify version
        run: |
          if yq e ".version == strenv(VERSION)" charts/keycloak-cr-operator/Chart.yaml; then
            echo "Chart version matches"
          else
            echo "Tag version $VERSION does not match Chart.yaml version"
            exit 1
          fi
          if yq e ".appVersion == strenv(APP_VERSION)" charts/keycloak-cr-operator/Chart.yaml; then
            echo "Chart appVersion matches"
          else
            echo "App version from tag $APP_VERSION does not match Chart.yaml version"
            exit 1
          fi
      - name: Publish Helm charts
        uses: stefanprodan/helm-gh-pages@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
