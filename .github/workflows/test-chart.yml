name: Test Chart

on:
  push:
  pull_request:

jobs:
  test-e2e:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.1.1
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          version: v0.31.0
          node_image: kindest/node:v1.34.3@sha256:08497ee19eace7b4b5348db5c6a1591d7752b164530a36f855cb0f2bdcbadd48
          cluster_name: kind

      - name: Prepare keycloak-cr-operator
        run: |
          go mod tidy
          make docker-build IMG=quay.io/ohiosupercomputercenter/keycloak-cr-operator:latest
          kind load docker-image quay.io/ohiosupercomputercenter/keycloak-cr-operator:latest

      - name: Run chart-testing (lint)
        run: ct lint --target-branch=main
      - name: Lint Helm Chart
        run: |
          helm lint ./charts/keycloak-cr-operator

      - name: Install cert-manager via Helm (wait for readiness)
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --set crds.enabled=true \
            --wait \
            --timeout 300s

      - name: Install Keycloak via Helm (wait for readiness)
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          helm install keycloak bitnami/keycloak -n keycloak \
            --version 21.2.0 \
            -f test/e2e/keycloak-values.yaml \
            --set auth.adminUser=admin \
            --set auth.adminPassword=secret

      - name: Deploy manager via Helm
        run: |
          make helm-deploy \
            IMG=quay.io/ohiosupercomputercenter/keycloak-cr-operator:latest \
            HELM_EXTRA_ARGS="-f charts/keycloak-cr-operator/ci/test-values.yaml"

      - name: Check Helm release status
        run: |
          make helm-status
