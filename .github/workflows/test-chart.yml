name: Test Chart

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-e2e:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.1.1
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          version: v0.31.0
          cluster_name: kind
          config: test/e2e/kind.yaml

      - name: Prepare keycloak-cr-operator
        run: |
          make docker-build IMG=quay.io/ohiosupercomputercenter/keycloak-cr-operator:latest
          kind load docker-image quay.io/ohiosupercomputercenter/keycloak-cr-operator:latest

      - name: Run chart-testing (lint)
        run: ct lint --target-branch=main --check-version-increment=false
      - name: Lint Helm Chart
        run: |
          helm lint ./charts/keycloak-cr-operator

      - name: Install cert-manager via Helm (wait for readiness)
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --version v1.20.0 \
            --set crds.enabled=true \
            --wait \
            --timeout 300s

      - name: Install Keycloak via Helm (wait for readiness)
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          helm install keycloak bitnami/keycloak \
            --wait \
            --timeout 300s \
            --namespace keycloak \
            --create-namespace \
            --version 21.2.0 \
            -f test/e2e/keycloak-values.yaml \
            --set auth.adminUser=admin \
            --set auth.adminPassword=secret
          helm status keycloak -n keycloak

      - name: Deploy manager via Helm
        run: |
          make helm-deploy \
            IMG=quay.io/ohiosupercomputercenter/keycloak-cr-operator:latest \
            HELM_EXTRA_ARGS="-f charts/keycloak-cr-operator/ci/test-values.yaml --cleanup-on-fail=false"

      - name: Check Helm release status
        run: |
          make helm-status
          kubectl get endpointslices.discovery.k8s.io -n keycloak-cr-operator-system -l kubernetes.io/service-name=keycloak-cr-operator-webhook-service -o jsonpath='{range .items[*]}{range .endpoints[*]}{.addresses[*]}{end}{end}'
          kubectl get mutatingwebhookconfigurations.admissionregistration.k8s.io keycloak-cr-operator-mutating-webhook-configuration -o jsonpath='{.webhooks[0].clientConfig.caBundle}'
          kubectl get validatingwebhookconfigurations.admissionregistration.k8s.io keycloak-cr-operator-validating-webhook-configuration -o jsonpath='{.webhooks[0].clientConfig.caBundle}'

      - name: Test KeycloakClient resource
        run: |
          kubectl apply -f config/samples/keycloak_v1alpha1_keycloakclient.yaml
          kubectl wait --for=condition=Available keycloakclient keycloakclient-test --timeout=20s

      - name: Get operator logs
        if: always()
        run: |
          kubectl logs -n keycloak-cr-operator -l app.kubernetes.io/name=keycloak-cr-operator --tail=200
      - name: Debugging
        if: always()
        run: |
          set +e
          kubectl describe pod -n keycloak
          kubectl logs -n keycloak -l app.kubernetes.io/instance=keycloak --tail=200
          kubectl describe pod -n keycloak-cr-operator
          kubectl describe keycloakclient keycloakclient-test
