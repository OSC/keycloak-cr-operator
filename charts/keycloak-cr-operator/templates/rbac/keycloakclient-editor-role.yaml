{{- if .Values.rbacHelpers.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    {{- include "keycloak-cr-operator.labels" . | nindent 4 }}
  name: "keycloakclient-editor-role"
rules:
- apiGroups:
  - keycloak.osc.edu
  resources:
  - keycloakclients
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - keycloak.osc.edu
  resources:
  - keycloakclients/status
  verbs:
  - get
{{- end }}
