apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    {{- include "keycloak-cr-operator.labels" . | nindent 4 }}
  name: {{ include "keycloak-cr-operator.resourceName" (dict "suffix" "leader-election-rolebinding" "context" $) }}
  namespace: {{ include "keycloak-cr-operator.namespaceName" . | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "keycloak-cr-operator.resourceName" (dict "suffix" "leader-election-role" "context" $) }}
subjects:
- kind: ServiceAccount
  name: {{ include "keycloak-cr-operator.serviceAccountName" . }}
  namespace: {{ include "keycloak-cr-operator.namespaceName" . | quote }}
